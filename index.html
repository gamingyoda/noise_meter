<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Noise Meter</title>
  <style>
    :root{
      --bg: #f6f7f9;
      --fg: #111;
      --muted: #666;
      --panel: rgba(255,255,255,0.86);
      --border: rgba(0,0,0,0.08);
      --button: #f1f3f5;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      color:var(--fg);
      transition: background-color 0.25s ease, color 0.25s ease;
      padding:16px;
    }

    body.state-quiet{
      --bg:#f6f7f9;
      --fg:#111;
      --muted:#666;
      --panel:rgba(255,255,255,0.88);
      --border:rgba(0,0,0,0.08);
      --button:#f1f3f5;
    }

    body.state-warning{
      --bg:#fff3cd;
      --fg:#5c4500;
      --muted:#856404;
      --panel:rgba(255,255,255,0.84);
      --border:rgba(133,100,4,0.18);
      --button:#fff8e1;
    }

    body.state-noisy{
      --bg:#f8d7da;
      --fg:#6a1118;
      --muted:#842029;
      --panel:rgba(255,255,255,0.84);
      --border:rgba(132,32,41,0.18);
      --button:#fcebec;
    }

    .box{
      width:min(560px, 100%);
      text-align:center;
      padding:24px 20px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:20px;
      backdrop-filter: blur(10px);
    }

    #db{
      font-size:80px;
      font-weight:800;
      letter-spacing:-0.03em;
      line-height:1;
      font-variant-numeric: tabular-nums;
    }

    #status{
      margin-top:10px;
      font-size:28px;
      font-weight:700;
    }

    #sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
    }

    .controls{
      margin-top:18px;
      display:grid;
      gap:12px;
    }

    .buttons{
      margin-top:6px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    @media (max-width: 420px){
      .buttons{ grid-template-columns: 1fr; }
      #db{ font-size:68px; }
      #status{ font-size:24px; }
    }

    .row{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:center;
      text-align:left;
    }

    .row label{
      font-size:14px;
      color:var(--muted);
    }

    .row input{
      width:110px;
      padding:10px 12px;
      font-size:16px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      color:#111;
    }

    button{
      margin-top:6px;
      padding:12px 18px;
      font-size:16px;
      font-weight:700;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--button);
      color:var(--fg);
    }

    .note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      text-align:left;
    }
  </style>
</head>
<body class="state-quiet">
  <div class="box">
    <div id="db">--</div>
    <div id="status">待機中</div>
    <div id="sub">dBFS（SLOW表示） / client only / GitHub Pages向け</div>

    <div class="controls">
      <div class="row">
        <label for="noisyDbInput">うるさい基準（dBFS）</label>
        <input id="noisyDbInput" type="number" step="0.1">
      </div>
      <div class="row">
        <label for="triggerSecInput">判定秒数（連続）</label>
        <input id="triggerSecInput" type="number" step="1" min="1">
      </div>
      <div class="row">
        <label for="speechCooldownInput">読み上げ間隔（秒）</label>
        <input id="speechCooldownInput" type="number" step="1" min="5">
      </div>
    </div>

    <div class="buttons">
      <button id="btn" data-state="off">開始</button>
      <button id="testSpeechBtn" type="button">音声テスト</button>
    </div>

    <div class="note">
      ・設定はこのブラウザに保存され、新しいタブでも引き継がれます。<br>
      ・色の意味：白＝静か、黄＝注意、赤＝うるさい。<br>
      ・赤になったら2秒のアラート音を鳴らしてから、最大音量設定で注意文を読み上げます。<br>
      ・iPadで音が出ない場合は、開始後に「音声テスト」を1回押してください。<br>
      ・赤になった後は、しばらく静かになるまで赤を維持します。
    </div>
  </div>

<script>
  const dbEl = document.getElementById('db');
  const statusEl = document.getElementById('status');
  const subEl = document.getElementById('sub');
  const btn = document.getElementById('btn');
  const testSpeechBtn = document.getElementById('testSpeechBtn');
  const noisyDbInput = document.getElementById('noisyDbInput');
  const triggerSecInput = document.getElementById('triggerSecInput');
  const speechCooldownInput = document.getElementById('speechCooldownInput');

  const STORAGE_KEYS = {
    noisyDb: 'noise_meter_noisy_db',
    triggerSec: 'noise_meter_trigger_sec',
    speechCooldownSec: 'noise_meter_speech_cooldown_sec'
  };

  const DEFAULTS = {
    noisyDb: -55.0,
    triggerSec: 5,
    speechCooldownSec: 10
  };

  const SPEECH_TEXT = '勉強している子の迷惑になります。小声で話してください。';

  // Web Speech APIで指定できる音量の最大値は 1.0 です。
  // iPad本体の音量も最大にして使ってください。
  const SPEECH_VOLUME_MAX = 1.0;
  const SPEECH_RATE = 0.92;
  const SPEECH_PITCH = 1.0;

  // 赤になった後にすぐ白へ戻らないようにするための解除条件
  const CLEAR_MARGIN_DB = 2.0; // noisyDb - 2dB を下回ったら静か判定候補
  const CLEAR_SEC = 3;         // 3秒連続で静かなら解除

  let ctx = null;
  let analyser = null;
  let stream = null;
  let raf = null;

  let winSumSq = 0;
  let winN = 0;
  let monitorTimer = null;

  let slowPower = null;
  let lastT = null;
  const TAU_SLOW = 1.0;
  const EPS = 1e-18;

  let noisyCount = 0;
  let quietCount = 0;
  let noisyActive = false;

  let speechPrimed = false;
  let lastSpeechAt = 0;

  // ===== 読み上げ前アラート音の旧サンプル（参考用・無効） =====
  // 下に、今回採用した playPreAlertBeep() を有効な関数として追加しています。
  //
  // function playPreAlertBeep(){
  //   const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  //   if (!AudioContextClass) return;
  //
  //   const audioCtx = ctx || new AudioContextClass();
  //   try { audioCtx.resume?.(); } catch(_) {}
  //
  //   const osc = audioCtx.createOscillator();
  //   const gain = audioCtx.createGain();
  //
  //   // Web Audioのゲインは大きくしすぎると音割れするため、まずは0.7程度にしています。
  //   // さらに強くしたい場合は 0.9〜1.0 まで上げてください。
  //   gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  //   gain.gain.exponentialRampToValueAtTime(0.7, audioCtx.currentTime + 0.02);
  //   gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
  //
  //   osc.type = 'square';
  //   osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  //   osc.connect(gain);
  //   gain.connect(audioCtx.destination);
  //
  //   osc.start(audioCtx.currentTime);
  //   osc.stop(audioCtx.currentTime + 0.2);
  //
  //   setTimeout(() => {
  //     try { osc.disconnect(); } catch(_) {}
  //     try { gain.disconnect(); } catch(_) {}
  //     if (!ctx) { try { audioCtx.close(); } catch(_) {} }
  //   }, 300);
  // }

  function playPreAlertBeep(){
    if (!ctx) return 0;

    const audioCtx = ctx;
    const duration = 2.0;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const t = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.0001, t);

    // pattern: pulse
    const pulseOn = 0.22;
    const pulseOff = 0.15;
    const cycle = pulseOn + pulseOff;

    for (let startOffset = 0; startOffset < duration; startOffset += cycle){
      const start = t + startOffset;
      const end = Math.min(t + duration, start + pulseOn);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(1, start + 0.025);
      gain.gain.setValueAtTime(1, Math.max(start + 0.03, end - 0.03));
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
    }

    osc.start(t);
    osc.stop(t + duration + 0.02);

    setTimeout(() => {
      try { osc.disconnect(); } catch(_) {}
      try { gain.disconnect(); } catch(_) {}
    }, (duration + 0.3) * 1000);

    // 読み上げをアラート音の後に始めるため、秒数を返す
    return duration;
  }

  // ===== ブザー機能（必要になったらコメントアウト解除） =====
  // let alarmOsc = null;
  // let alarmGain = null;
  // function startAlarmSound(){
  //   if (!ctx || alarmOsc) return;
  //   alarmGain = ctx.createGain();
  //   alarmGain.gain.setValueAtTime(0.0, ctx.currentTime);
  //   alarmGain.connect(ctx.destination);
  //   alarmOsc = ctx.createOscillator();
  //   alarmOsc.type = 'square';
  //   alarmOsc.frequency.setValueAtTime(880, ctx.currentTime);
  //   alarmOsc.connect(alarmGain);
  //   alarmOsc.start();
  //   alarmGain.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.05);
  // }
  // function stopAlarmSound(){
  //   if (alarmGain && ctx){
  //     try {
  //       alarmGain.gain.cancelScheduledValues(ctx.currentTime);
  //       alarmGain.gain.setValueAtTime(alarmGain.gain.value, ctx.currentTime);
  //       alarmGain.gain.linearRampToValueAtTime(0.0, ctx.currentTime + 0.05);
  //     } catch(_) {}
  //   }
  //   if (alarmOsc){
  //     const osc = alarmOsc;
  //     alarmOsc = null;
  //     setTimeout(() => {
  //       try { osc.stop(); } catch(_) {}
  //       try { osc.disconnect(); } catch(_) {}
  //     }, 80);
  //   }
  //   if (alarmGain){
  //     const gain = alarmGain;
  //     alarmGain = null;
  //     setTimeout(() => {
  //       try { gain.disconnect(); } catch(_) {}
  //     }, 100);
  //   }
  // }

  function speechSupported(){
    return 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
  }

  function getJapaneseVoice(){
    if (!speechSupported()) return null;
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v => v.lang === 'ja-JP') ||
           voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) ||
           null;
  }

  function createUtterance(text, volume = SPEECH_VOLUME_MAX){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = SPEECH_RATE;
    u.pitch = SPEECH_PITCH;
    u.volume = Math.max(0, Math.min(1, volume));

    const voice = getJapaneseVoice();
    if (voice) u.voice = voice;

    return u;
  }

  // iPad Safari対策：開始ボタンのタップ中に一度だけ音声APIへ触れておく
  function primeSpeech(){
    if (!speechSupported() || speechPrimed) return;
    try {
      window.speechSynthesis.cancel();
      const u = createUtterance(' ', 0.0);
      window.speechSynthesis.speak(u);
      speechPrimed = true;
    } catch(e) {
      console.warn('speech prime failed:', e);
    }
  }

  function stopSpeech(){
    if (!speechSupported()) return;
    try { window.speechSynthesis.cancel(); } catch(_) {}
  }

  function speakWarning(force = false){
    if (!speechSupported()) {
      if (force) alert('このブラウザは音声読み上げに対応していません。');
      return;
    }

    const now = Date.now();
    const cooldownMs = getSpeechCooldownSec() * 1000;
    if (!force && now - lastSpeechAt < cooldownMs) return;

    try {
      window.speechSynthesis.cancel();

      // 2秒のアラート音を先に鳴らし、その後に読み上げます。
      // アラート音が不要な場合は、次の1行をコメントアウトし、
      // alertDurationSec を 0 にしてください。
      const alertDurationSec = playPreAlertBeep();

      const speak = () => {
        const u = createUtterance(SPEECH_TEXT, SPEECH_VOLUME_MAX);
        u.onerror = (e) => console.warn('speech error:', e);
        window.speechSynthesis.speak(u);
      };

      if (alertDurationSec > 0){
        setTimeout(speak, (alertDurationSec + 0.15) * 1000);
      } else {
        speak();
      }

      if (!force) lastSpeechAt = now;
    } catch(e) {
      console.warn('speech failed:', e);
    }
  }

  if (speechSupported()){
    // Safariでは音声リストが遅れて入ることがあるため、変更時にも取得しておく
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    window.speechSynthesis.getVoices();
  }

  function isSecureOk(){
    return location.protocol === 'https:' ||
           location.hostname === 'localhost' ||
           location.hostname === '127.0.0.1';
  }

  function loadNumber(key, fallback){
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    const num = Number(raw);
    return Number.isFinite(num) ? num : fallback;
  }

  function saveSettings(){
    localStorage.setItem(STORAGE_KEYS.noisyDb, String(getNoisyDb()));
    localStorage.setItem(STORAGE_KEYS.triggerSec, String(getTriggerSec()));
    localStorage.setItem(STORAGE_KEYS.speechCooldownSec, String(getSpeechCooldownSec()));
  }

  function applySettingsToInputs(){
    noisyDbInput.value = loadNumber(STORAGE_KEYS.noisyDb, DEFAULTS.noisyDb).toFixed(1);
    triggerSecInput.value = String(loadNumber(STORAGE_KEYS.triggerSec, DEFAULTS.triggerSec));
    speechCooldownInput.value = String(loadNumber(STORAGE_KEYS.speechCooldownSec, DEFAULTS.speechCooldownSec));
  }

  function getNoisyDb(){
    const v = Number(noisyDbInput.value);
    return Number.isFinite(v) ? v : DEFAULTS.noisyDb;
  }

  function getTriggerSec(){
    const v = Math.floor(Number(triggerSecInput.value));
    return Number.isFinite(v) && v >= 1 ? v : DEFAULTS.triggerSec;
  }

  function getSpeechCooldownSec(){
    const v = Math.floor(Number(speechCooldownInput.value));
    return Number.isFinite(v) && v >= 5 ? v : DEFAULTS.speechCooldownSec;
  }

  function syncSettingsSummary(){
    const clearDb = getNoisyDb() - CLEAR_MARGIN_DB;
    subEl.textContent = `dBFS（SLOW表示） / しきい値 ${getNoisyDb().toFixed(1)} dBFS / ${getTriggerSec()}秒連続で赤 / 読み上げ間隔 ${getSpeechCooldownSec()}秒 / ${clearDb.toFixed(1)}未満が${CLEAR_SEC}秒続くと解除`;
  }

  function setVisualState(state, text){
    document.body.classList.remove('state-quiet', 'state-warning', 'state-noisy');
    document.body.classList.add(`state-${state}`);
    statusEl.textContent = text;
  }

  function resetJudgeState(){
    noisyCount = 0;
    quietCount = 0;
    noisyActive = false;
    setVisualState('quiet', '静か');
    // stopAlarmSound();
  }

  function calcPowerAndSumSq(floatData){
    let mean = 0;
    for (let i = 0; i < floatData.length; i++) mean += floatData[i];
    mean /= floatData.length;

    let sumSq = 0;
    for (let i = 0; i < floatData.length; i++){
      const v = floatData[i] - mean;
      sumSq += v * v;
    }
    const power = sumSq / floatData.length;
    return { power, sumSq, n: floatData.length };
  }

  function updateJudgeState(db1s){
    const noisyDb = getNoisyDb();
    const triggerSec = getTriggerSec();
    const clearDb = noisyDb - CLEAR_MARGIN_DB;

    if (!noisyActive){
      if (db1s >= noisyDb){
        noisyCount += 1;
      } else {
        noisyCount = 0;
      }

      if (noisyCount >= triggerSec){
        noisyActive = true;
        quietCount = 0;
        setVisualState('noisy', 'うるさい');
        speakWarning(false);
        // startAlarmSound();
        return;
      }

      if (noisyCount > 0){
        const remain = triggerSec - noisyCount;
        setVisualState('warning', `注意まで ${remain}秒`);
      } else {
        setVisualState('quiet', '静か');
      }
      return;
    }

    // うるさい状態になった後は、十分静かになるまで赤を維持
    if (db1s < clearDb){
      quietCount += 1;
    } else {
      quietCount = 0;
    }

    if (quietCount >= CLEAR_SEC){
      noisyActive = false;
      noisyCount = 0;
      quietCount = 0;
      setVisualState('quiet', '静か');
      // stopAlarmSound();
      return;
    }

    setVisualState('noisy', 'うるさい');
    speakWarning(false);
  }

  function startLoop(){
    const buf = new Float32Array(analyser.fftSize);

    const tick = (t) => {
      if (!lastT) lastT = t;
      const dt = Math.max(0, (t - lastT) / 1000);
      lastT = t;

      analyser.getFloatTimeDomainData(buf);
      const { power, sumSq, n } = calcPowerAndSumSq(buf);

      if (slowPower === null) slowPower = power;
      const alpha = 1 - Math.exp(-dt / TAU_SLOW);
      slowPower = (1 - alpha) * slowPower + alpha * power;

      const dbSlow = 10 * Math.log10(slowPower + EPS);
      dbEl.textContent = dbSlow.toFixed(1);

      winSumSq += sumSq;
      winN += n;

      raf = requestAnimationFrame(tick);
    };

    raf = requestAnimationFrame(tick);
  }

  function startMonitor(){
    stopMonitor();
    monitorTimer = setInterval(() => {
      if (winN > 0){
        const power1s = winSumSq / winN;
        const db1s = 10 * Math.log10(power1s + EPS);
        updateJudgeState(db1s);
      }
      winSumSq = 0;
      winN = 0;
    }, 1000);
  }

  function stopMonitor(){
    if (monitorTimer){
      clearInterval(monitorTimer);
      monitorTimer = null;
    }
    winSumSq = 0;
    winN = 0;
  }

  async function start(){
    if (!isSecureOk()){
      alert('HTTPSで開く必要があります');
      return;
    }

    btn.disabled = true;

    try{
      primeSpeech();

      ctx = new (window.AudioContext || window.webkitAudioContext)();
      await ctx.resume();

      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      const src = ctx.createMediaStreamSource(stream);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      src.connect(analyser);

      resetJudgeState();
      startLoop();
      startMonitor();

      btn.textContent = '停止';
      btn.dataset.state = 'on';
      btn.disabled = false;
    }catch(e){
      alert('エラー: ' + (e?.message || e));
      await stop();
      btn.disabled = false;
    }
  }

  async function stop(){
    btn.disabled = true;

    if (raf) cancelAnimationFrame(raf);
    raf = null;

    stopMonitor();

    try { stream?.getTracks().forEach(t => t.stop()); } catch(_) {}
    stream = null;

    resetJudgeState();
    stopSpeech();

    try { await ctx?.close(); } catch(_) {}
    ctx = null;
    analyser = null;

    slowPower = null;
    lastT = null;
    lastSpeechAt = 0;

    dbEl.textContent = '--';
    syncSettingsSummary();
    setVisualState('quiet', '待機中');

    btn.textContent = '開始';
    btn.dataset.state = 'off';
    btn.disabled = false;
  }

  noisyDbInput.addEventListener('input', () => {
    saveSettings();
    syncSettingsSummary();
    if (btn.dataset.state !== 'on') setVisualState('quiet', '待機中');
  });

  triggerSecInput.addEventListener('input', () => {
    saveSettings();
    syncSettingsSummary();
    if (btn.dataset.state !== 'on') setVisualState('quiet', '待機中');
  });

  speechCooldownInput.addEventListener('input', () => {
    saveSettings();
    syncSettingsSummary();
    if (btn.dataset.state !== 'on') setVisualState('quiet', '待機中');
  });

  window.addEventListener('storage', (event) => {
    if (event.key === STORAGE_KEYS.noisyDb ||
        event.key === STORAGE_KEYS.triggerSec ||
        event.key === STORAGE_KEYS.speechCooldownSec){
      applySettingsToInputs();
      syncSettingsSummary();
    }
  });

  btn.addEventListener('click', async () => {
    if (btn.dataset.state === 'on') await stop();
    else await start();
  });

  testSpeechBtn.addEventListener('click', () => {
    primeSpeech();
    speakWarning(true);
  });

  applySettingsToInputs();
  syncSettingsSummary();
  setVisualState('quiet', '待機中');
</script>
</body>
</html>
