<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Noise Monitor</title>
  <style>
    :root{
      --bg:#007aff;
      --fg:#ffffff;
      --muted:rgba(255,255,255,0.82);
      --panel:rgba(255,255,255,0.10);
      --panel-strong:rgba(0,0,0,0.18);
      --border:rgba(255,255,255,0.28);
      --button:rgba(255,255,255,0.18);
      --button-strong:rgba(255,255,255,0.28);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      color:var(--fg);
      padding:16px;
      transition:background-color 0.18s ease, color 0.18s ease;
      overflow-x:hidden;
    }

    body.state-safe{
      --bg:#007aff;       /* 信号の青に相当：セーフ */
      --fg:#ffffff;
      --muted:rgba(255,255,255,0.82);
      --panel:rgba(255,255,255,0.10);
      --panel-strong:rgba(0,0,0,0.16);
      --border:rgba(255,255,255,0.30);
      --button:rgba(255,255,255,0.18);
      --button-strong:rgba(255,255,255,0.30);
    }

    body.state-caution{
      --bg:#ffd400;       /* 黄色：注意 */
      --fg:#111111;
      --muted:rgba(0,0,0,0.66);
      --panel:rgba(255,255,255,0.20);
      --panel-strong:rgba(255,255,255,0.36);
      --border:rgba(0,0,0,0.18);
      --button:rgba(255,255,255,0.36);
      --button-strong:rgba(255,255,255,0.56);
    }

    body.state-out{
      --bg:#ff1744;       /* 赤：アウト */
      --fg:#ffffff;
      --muted:rgba(255,255,255,0.84);
      --panel:rgba(255,255,255,0.11);
      --panel-strong:rgba(0,0,0,0.22);
      --border:rgba(255,255,255,0.32);
      --button:rgba(255,255,255,0.18);
      --button-strong:rgba(255,255,255,0.30);
    }

    .app{
      width:min(680px, 100%);
      display:grid;
      gap:14px;
    }

    .panel{
      min-height:calc(100vh - 32px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
      border:1px solid var(--border);
      border-radius:28px;
      background:var(--panel);
      padding:24px 20px;
    }

    .label{
      font-size:13px;
      font-weight:900;
      letter-spacing:0.18em;
      color:var(--muted);
      text-transform:uppercase;
      user-select:none;
    }

    #statusEn{
      margin:18px 0 0;
      font-size:clamp(56px, 15vw, 118px);
      line-height:0.95;
      font-weight:1000;
      letter-spacing:0.06em;
    }

    #statusJa{
      margin-top:14px;
      font-size:clamp(24px, 7vw, 44px);
      font-weight:900;
      letter-spacing:0.04em;
    }

    #db{
      margin-top:24px;
      font-size:clamp(64px, 17vw, 124px);
      line-height:1;
      font-weight:1000;
      letter-spacing:-0.05em;
      font-variant-numeric:tabular-nums;
    }

    #sub{
      margin-top:8px;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
      font-weight:700;
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      margin-top:26px;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px 16px;
      font-size:17px;
      font-weight:900;
      background:var(--button);
      color:var(--fg);
      cursor:pointer;
      backdrop-filter:blur(8px);
    }

    button.primary{ background:var(--button-strong); }
    button:disabled{ opacity:0.55; cursor:not-allowed; }

    .settings{
      display:none;
      background:var(--panel-strong);
      border:1px solid var(--border);
      border-radius:22px;
      padding:14px;
      text-align:left;
      backdrop-filter:blur(10px);
    }

    .settings.open{ display:block; }

    .settings h2{
      margin:0 0 10px;
      font-size:16px;
      letter-spacing:0.08em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .grid{ display:grid; gap:10px; }

    .row{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      align-items:center;
      min-height:42px;
    }

    .row label{
      font-size:14px;
      color:var(--muted);
      line-height:1.4;
      font-weight:700;
    }

    .row input,
    .row select{
      width:120px;
      padding:9px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.94);
      color:#111;
      font-size:15px;
    }

    .row input[type="checkbox"]{ width:24px; height:24px; }

    .section{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--border);
    }

    .note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    .pill{
      display:inline-block;
      margin-top:10px;
      padding:5px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    @media (max-width:440px){
      .panel{ min-height:calc(100vh - 32px); }
      .buttons{ grid-template-columns:1fr; }
      .row{ grid-template-columns:1fr; }
      .row input,
      .row select{ width:100%; }
    }
  </style>
</head>
<body class="state-safe">
  <main class="app">
    <section class="panel" aria-live="polite">
      <div class="label">NOISE MONITOR</div>
      <h1 id="statusEn">STANDBY</h1>
      <div id="statusJa">待機中</div>
      <div id="db">--</div>
      <div id="sub">青＝セーフ / 黄＝注意 / 赤＝アウト</div>

      <div class="buttons">
        <button id="btn" class="primary" data-state="off">開始</button>
        <button id="settingsBtn" type="button" aria-expanded="false">設定</button>
      </div>
      <div class="pill" id="filterPill">FILTER STANDBY / 現在無効</div>
    </section>

    <section class="settings" id="settingsPanel">
      <h2>Settings</h2>
      <div class="grid">
        <div class="row">
          <label for="cautionDbInput">黄色基準 CAUTION（dBFS）<br>まずい状態の入口</label>
          <input id="cautionDbInput" type="number" step="0.1">
        </div>
        <div class="row">
          <label for="warningDbInput">赤基準 OUT（dBFS）<br>人が注意しに来る状態</label>
          <input id="warningDbInput" type="number" step="0.1">
        </div>
        <div class="row">
          <label for="cautionSecInput">黄色判定秒数（連続）</label>
          <input id="cautionSecInput" type="number" step="1" min="1">
        </div>
        <div class="row">
          <label for="warningSecInput">赤判定秒数（連続）</label>
          <input id="warningSecInput" type="number" step="1" min="1">
        </div>
        <div class="row">
          <label for="clearMarginInput">解除マージン（dB）<br>赤基準より何dB下がったら解除候補にするか</label>
          <input id="clearMarginInput" type="number" step="0.1" min="0">
        </div>
        <div class="row">
          <label for="clearSecInput">解除秒数（連続）</label>
          <input id="clearSecInput" type="number" step="1" min="1">
        </div>
      </div>

      <div class="section">
        <h2>Audio / Voice</h2>
        <div class="grid">
          <div class="row">
            <label for="audioEnabledInput">警告音・人工音声を有効化</label>
            <input id="audioEnabledInput" type="checkbox">
          </div>
          <div class="row">
            <label for="voiceLangInput">人工音声の言語</label>
            <select id="voiceLangInput">
              <option value="ja">日本語</option>
              <option value="en">English</option>
              <option value="both">日本語 + English</option>
            </select>
          </div>
          <div class="row">
            <label for="voiceCooldownInput">音声再通知間隔（秒）</label>
            <input id="voiceCooldownInput" type="number" step="1" min="5">
          </div>
          <div class="row">
            <label for="audioVolumeInput">警告音量</label>
            <input id="audioVolumeInput" type="number" step="0.05" min="0" max="1">
          </div>
          <button id="testAudioBtn" type="button">音声テスト</button>
        </div>
        <div class="note">赤になった時だけ，航空機の警報風の短いトーンと人工音声を鳴らします．iPadで音が出ない場合は，開始後に音声テストを1回押してください．</div>
      </div>

      <div class="section">
        <h2>Filter Scaffold</h2>
        <div class="grid">
          <div class="row">
            <label for="filterModeInput">フィルター方式（現在は無効）</label>
            <select id="filterModeInput" disabled>
              <option value="off">OFF</option>
              <option value="highpass">High-pass</option>
              <option value="lowpass">Low-pass</option>
              <option value="bandpass">Band-pass</option>
            </select>
          </div>
          <div class="row">
            <label for="highpassHzInput">High-pass cutoff（Hz・準備中）</label>
            <input id="highpassHzInput" type="number" step="10" min="20" max="8000" disabled>
          </div>
          <div class="row">
            <label for="lowpassHzInput">Low-pass cutoff（Hz・準備中）</label>
            <input id="lowpassHzInput" type="number" step="10" min="20" max="12000" disabled>
          </div>
        </div>
        <div class="note">自販機ノイズの帯域測定が終わるまでは，フィルターは意図的に動作しません．将来は source → filterChain → analyser の接続に切り替えるだけで有効化できる構造にしています．</div>
      </div>
    </section>
  </main>

<script>
  const dbEl = document.getElementById('db');
  const statusEnEl = document.getElementById('statusEn');
  const statusJaEl = document.getElementById('statusJa');
  const subEl = document.getElementById('sub');
  const btn = document.getElementById('btn');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const filterPill = document.getElementById('filterPill');

  const cautionDbInput = document.getElementById('cautionDbInput');
  const warningDbInput = document.getElementById('warningDbInput');
  const cautionSecInput = document.getElementById('cautionSecInput');
  const warningSecInput = document.getElementById('warningSecInput');
  const clearMarginInput = document.getElementById('clearMarginInput');
  const clearSecInput = document.getElementById('clearSecInput');
  const audioEnabledInput = document.getElementById('audioEnabledInput');
  const voiceLangInput = document.getElementById('voiceLangInput');
  const voiceCooldownInput = document.getElementById('voiceCooldownInput');
  const audioVolumeInput = document.getElementById('audioVolumeInput');
  const testAudioBtn = document.getElementById('testAudioBtn');
  const filterModeInput = document.getElementById('filterModeInput');
  const highpassHzInput = document.getElementById('highpassHzInput');
  const lowpassHzInput = document.getElementById('lowpassHzInput');

  const STORAGE_KEYS = {
    cautionDb: 'noise_meter_caution_db',
    warningDb: 'noise_meter_warning_db',
    cautionSec: 'noise_meter_caution_sec',
    warningSec: 'noise_meter_warning_sec',
    clearMarginDb: 'noise_meter_clear_margin_db',
    clearSec: 'noise_meter_clear_sec',
    audioEnabled: 'noise_meter_audio_enabled',
    voiceLang: 'noise_meter_voice_lang',
    voiceCooldownSec: 'noise_meter_voice_cooldown_sec',
    audioVolume: 'noise_meter_audio_volume',
    filterMode: 'noise_meter_filter_mode',
    highpassHz: 'noise_meter_highpass_hz',
    lowpassHz: 'noise_meter_lowpass_hz'
  };

  const DEFAULTS = {
    cautionDb: -58.0,
    warningDb: -55.0,
    cautionSec: 3,
    warningSec: 5,
    clearMarginDb: 2.0,
    clearSec: 3,
    audioEnabled: true,
    voiceLang: 'both',
    voiceCooldownSec: 25,
    audioVolume: 0.18,
    filterMode: 'off',
    highpassHz: 150,
    lowpassHz: 4000
  };

  const FILTER_ENGINE_ENABLED = false;

  let ctx = null;
  let analyser = null;
  let stream = null;
  let raf = null;
  let sourceNode = null;
  let highpassNode = null;
  let lowpassNode = null;

  let winSumSq = 0;
  let winN = 0;
  let monitorTimer = null;

  let slowPower = null;
  let lastT = null;
  const TAU_SLOW = 1.0;
  const EPS = 1e-18;

  let currentState = 'safe';
  let cautionCount = 0;
  let warningCount = 0;
  let clearCount = 0;
  let lastVoiceAt = 0;
  let audioPrimed = false;

  function isSecureOk(){
    return location.protocol === 'https:' ||
           location.hostname === 'localhost' ||
           location.hostname === '127.0.0.1';
  }

  function loadNumber(key, fallback){
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    const num = Number(raw);
    return Number.isFinite(num) ? num : fallback;
  }

  function loadBool(key, fallback){
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    return raw === 'true';
  }

  function loadString(key, fallback){
    const raw = localStorage.getItem(key);
    return raw === null ? fallback : raw;
  }

  function validNumber(value, fallback, min=-Infinity){
    const n = Number(value);
    return Number.isFinite(n) && n >= min ? n : fallback;
  }

  function validInt(value, fallback, min=1){
    const n = Math.floor(Number(value));
    return Number.isFinite(n) && n >= min ? n : fallback;
  }

  function clamp(x, a, b){
    return Math.min(b, Math.max(a, x));
  }

  function getSettings(){
    return {
      cautionDb: validNumber(cautionDbInput.value, DEFAULTS.cautionDb),
      warningDb: validNumber(warningDbInput.value, DEFAULTS.warningDb),
      cautionSec: validInt(cautionSecInput.value, DEFAULTS.cautionSec, 1),
      warningSec: validInt(warningSecInput.value, DEFAULTS.warningSec, 1),
      clearMarginDb: validNumber(clearMarginInput.value, DEFAULTS.clearMarginDb, 0),
      clearSec: validInt(clearSecInput.value, DEFAULTS.clearSec, 1),
      audioEnabled: audioEnabledInput.checked,
      voiceLang: voiceLangInput.value || DEFAULTS.voiceLang,
      voiceCooldownSec: validInt(voiceCooldownInput.value, DEFAULTS.voiceCooldownSec, 5),
      audioVolume: clamp(validNumber(audioVolumeInput.value, DEFAULTS.audioVolume), 0, 1),
      filterMode: filterModeInput.value || DEFAULTS.filterMode,
      highpassHz: validNumber(highpassHzInput.value, DEFAULTS.highpassHz, 20),
      lowpassHz: validNumber(lowpassHzInput.value, DEFAULTS.lowpassHz, 20)
    };
  }

  function applySettingsToInputs(){
    cautionDbInput.value = loadNumber(STORAGE_KEYS.cautionDb, DEFAULTS.cautionDb).toFixed(1);
    warningDbInput.value = loadNumber(STORAGE_KEYS.warningDb, DEFAULTS.warningDb).toFixed(1);
    cautionSecInput.value = String(loadNumber(STORAGE_KEYS.cautionSec, DEFAULTS.cautionSec));
    warningSecInput.value = String(loadNumber(STORAGE_KEYS.warningSec, DEFAULTS.warningSec));
    clearMarginInput.value = loadNumber(STORAGE_KEYS.clearMarginDb, DEFAULTS.clearMarginDb).toFixed(1);
    clearSecInput.value = String(loadNumber(STORAGE_KEYS.clearSec, DEFAULTS.clearSec));
    audioEnabledInput.checked = loadBool(STORAGE_KEYS.audioEnabled, DEFAULTS.audioEnabled);
    voiceLangInput.value = loadString(STORAGE_KEYS.voiceLang, DEFAULTS.voiceLang);
    voiceCooldownInput.value = String(loadNumber(STORAGE_KEYS.voiceCooldownSec, DEFAULTS.voiceCooldownSec));
    audioVolumeInput.value = loadNumber(STORAGE_KEYS.audioVolume, DEFAULTS.audioVolume).toFixed(2);
    filterModeInput.value = loadString(STORAGE_KEYS.filterMode, DEFAULTS.filterMode);
    highpassHzInput.value = String(loadNumber(STORAGE_KEYS.highpassHz, DEFAULTS.highpassHz));
    lowpassHzInput.value = String(loadNumber(STORAGE_KEYS.lowpassHz, DEFAULTS.lowpassHz));
  }

  function saveSettings(){
    const s = getSettings();
    localStorage.setItem(STORAGE_KEYS.cautionDb, String(s.cautionDb));
    localStorage.setItem(STORAGE_KEYS.warningDb, String(s.warningDb));
    localStorage.setItem(STORAGE_KEYS.cautionSec, String(s.cautionSec));
    localStorage.setItem(STORAGE_KEYS.warningSec, String(s.warningSec));
    localStorage.setItem(STORAGE_KEYS.clearMarginDb, String(s.clearMarginDb));
    localStorage.setItem(STORAGE_KEYS.clearSec, String(s.clearSec));
    localStorage.setItem(STORAGE_KEYS.audioEnabled, String(s.audioEnabled));
    localStorage.setItem(STORAGE_KEYS.voiceLang, s.voiceLang);
    localStorage.setItem(STORAGE_KEYS.voiceCooldownSec, String(s.voiceCooldownSec));
    localStorage.setItem(STORAGE_KEYS.audioVolume, String(s.audioVolume));
    localStorage.setItem(STORAGE_KEYS.filterMode, s.filterMode);
    localStorage.setItem(STORAGE_KEYS.highpassHz, String(s.highpassHz));
    localStorage.setItem(STORAGE_KEYS.lowpassHz, String(s.lowpassHz));
    updateSummary();
  }

  function updateSummary(){
    const s = getSettings();
    subEl.textContent = `CAUTION ${s.cautionDb.toFixed(1)} dBFS / OUT ${s.warningDb.toFixed(1)} dBFS / SLOW表示`;
    filterPill.textContent = FILTER_ENGINE_ENABLED ? `FILTER ${s.filterMode.toUpperCase()}` : 'FILTER STANDBY / 現在無効';
  }

  function setState(state, en, ja){
    currentState = state;
    document.body.classList.remove('state-safe', 'state-caution', 'state-out');
    document.body.classList.add(`state-${state}`);
    statusEnEl.textContent = en;
    statusJaEl.textContent = ja;
  }

  function resetJudgeState(){
    cautionCount = 0;
    warningCount = 0;
    clearCount = 0;
    setState('safe', 'SAFE', '静か');
  }

  function calcPowerAndSumSq(floatData){
    let mean = 0;
    for (let i = 0; i < floatData.length; i++) mean += floatData[i];
    mean /= floatData.length;

    let sumSq = 0;
    for (let i = 0; i < floatData.length; i++){
      const v = floatData[i] - mean;
      sumSq += v * v;
    }
    const power = sumSq / floatData.length;
    return { power, sumSq, n: floatData.length };
  }

  function connectAudioGraph(src){
    sourceNode = src;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 2048;

    if (!FILTER_ENGINE_ENABLED){
      src.connect(analyser);
      return;
    }

    const s = getSettings();
    highpassNode = ctx.createBiquadFilter();
    highpassNode.type = 'highpass';
    highpassNode.frequency.setValueAtTime(s.highpassHz, ctx.currentTime);

    lowpassNode = ctx.createBiquadFilter();
    lowpassNode.type = 'lowpass';
    lowpassNode.frequency.setValueAtTime(s.lowpassHz, ctx.currentTime);

    if (s.filterMode === 'highpass'){
      src.connect(highpassNode).connect(analyser);
    } else if (s.filterMode === 'lowpass'){
      src.connect(lowpassNode).connect(analyser);
    } else if (s.filterMode === 'bandpass'){
      src.connect(highpassNode).connect(lowpassNode).connect(analyser);
    } else {
      src.connect(analyser);
    }
  }

  function playAviationTone(kind='out'){
    if (!ctx) return;
    const s = getSettings();
    if (!s.audioEnabled) return;

    try { ctx.resume?.(); } catch(_) {}

    const t0 = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, t0);
    master.gain.exponentialRampToValueAtTime(Math.max(0.001, s.audioVolume), t0 + 0.03);
    master.gain.exponentialRampToValueAtTime(0.0001, t0 + (kind === 'out' ? 1.25 : 0.45));
    master.connect(ctx.destination);

    const freqs = kind === 'out' ? [880, 660, 880, 660] : [660, 660];
    const step = kind === 'out' ? 0.28 : 0.18;

    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = kind === 'out' ? 'square' : 'sine';
      osc.frequency.setValueAtTime(freq, t0 + i * step);
      gain.gain.setValueAtTime(0.0001, t0 + i * step);
      gain.gain.exponentialRampToValueAtTime(1.0, t0 + i * step + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + i * step + step * 0.75);
      osc.connect(gain).connect(master);
      osc.start(t0 + i * step);
      osc.stop(t0 + i * step + step * 0.9);
    });

    setTimeout(() => {
      try { master.disconnect(); } catch(_) {}
    }, kind === 'out' ? 1500 : 700);
  }

  function speakAlert(kind='out'){
    const s = getSettings();
    if (!s.audioEnabled || !('speechSynthesis' in window)) return;

    const now = Date.now();
    if (now - lastVoiceAt < s.voiceCooldownSec * 1000) return;
    lastVoiceAt = now;

    const ja = kind === 'out'
      ? '警告。声量を下げてください。自習室の利用者の迷惑になります。'
      : '注意。声量が大きくなっています。';
    const en = kind === 'out'
      ? 'Warning. Please lower your voice. This is a quiet study area.'
      : 'Caution. Noise level is increasing.';

    const text = s.voiceLang === 'ja' ? ja : s.voiceLang === 'en' ? en : `${ja} ${en}`;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = s.voiceLang === 'en' ? 'en-US' : 'ja-JP';
    utter.rate = 0.88;
    utter.pitch = 0.95;
    utter.volume = 1.0;
    try {
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    } catch(_) {}
  }

  function primeAudio(){
    if (audioPrimed || !ctx) return;
    try { ctx.resume?.(); } catch(_) {}
    const gain = ctx.createGain();
    const osc = ctx.createOscillator();
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.02);
    setTimeout(() => {
      try { gain.disconnect(); } catch(_) {}
    }, 60);
    audioPrimed = true;
  }

  function updateJudgeState(db1s){
    const s = getSettings();
    const clearDb = s.warningDb - s.clearMarginDb;

    if (currentState === 'out'){
      if (db1s < clearDb){
        clearCount += 1;
      } else {
        clearCount = 0;
      }

      if (clearCount >= s.clearSec){
        warningCount = 0;
        clearCount = 0;
        if (db1s >= s.cautionDb){
          setState('caution', 'CAUTION', '注意');
        } else {
          setState('safe', 'SAFE', 'セーフ');
        }
      } else {
        setState('out', 'OUT', 'アウト');
      }
      return;
    }

    clearCount = 0;

    if (db1s >= s.warningDb){
      warningCount += 1;
      cautionCount += 1;
    } else {
      warningCount = 0;
      if (db1s >= s.cautionDb){
        cautionCount += 1;
      } else {
        cautionCount = 0;
      }
    }

    if (warningCount >= s.warningSec){
      setState('out', 'OUT', 'アウト');
      playAviationTone('out');
      speakAlert('out');
      return;
    }

    if (cautionCount >= s.cautionSec){
      setState('caution', 'CAUTION', '注意');
      return;
    }

    const remainingOut = Math.max(0, s.warningSec - warningCount);
    const remainingCaution = Math.max(0, s.cautionSec - cautionCount);

    if (warningCount > 0){
      setState('caution', 'CAUTION', `赤まで ${remainingOut}秒`);
    } else if (cautionCount > 0){
      setState('caution', 'CAUTION', `黄まで ${remainingCaution}秒`);
    } else {
      setState('safe', 'SAFE', 'セーフ');
    }
  }

  function startLoop(){
    const buf = new Float32Array(analyser.fftSize);

    const tick = (t) => {
      if (!lastT) lastT = t;
      const dt = Math.max(0, (t - lastT) / 1000);
      lastT = t;

      analyser.getFloatTimeDomainData(buf);
      const { power, sumSq, n } = calcPowerAndSumSq(buf);

      if (slowPower === null) slowPower = power;
      const alpha = 1 - Math.exp(-dt / TAU_SLOW);
      slowPower = (1 - alpha) * slowPower + alpha * power;

      const dbSlow = 10 * Math.log10(slowPower + EPS);
      dbEl.textContent = dbSlow.toFixed(1);

      winSumSq += sumSq;
      winN += n;

      raf = requestAnimationFrame(tick);
    };

    raf = requestAnimationFrame(tick);
  }

  function startMonitor(){
    stopMonitor();
    monitorTimer = setInterval(() => {
      if (winN > 0){
        const power1s = winSumSq / winN;
        const db1s = 10 * Math.log10(power1s + EPS);
        updateJudgeState(db1s);
      }
      winSumSq = 0;
      winN = 0;
    }, 1000);
  }

  function stopMonitor(){
    if (monitorTimer){
      clearInterval(monitorTimer);
      monitorTimer = null;
    }
    winSumSq = 0;
    winN = 0;
  }

  async function start(){
    if (!isSecureOk()){
      alert('HTTPSで開く必要があります');
      return;
    }

    btn.disabled = true;

    try{
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      await ctx.resume();
      primeAudio();

      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      const src = ctx.createMediaStreamSource(stream);
      connectAudioGraph(src);

      resetJudgeState();
      startLoop();
      startMonitor();

      btn.textContent = '停止';
      btn.dataset.state = 'on';
      btn.disabled = false;
    }catch(e){
      alert('エラー: ' + (e?.message || e));
      await stop();
      btn.disabled = false;
    }
  }

  async function stop(){
    btn.disabled = true;

    if (raf) cancelAnimationFrame(raf);
    raf = null;

    stopMonitor();

    try { stream?.getTracks().forEach(t => t.stop()); } catch(_) {}
    stream = null;

    try { sourceNode?.disconnect(); } catch(_) {}
    sourceNode = null;
    try { highpassNode?.disconnect(); } catch(_) {}
    highpassNode = null;
    try { lowpassNode?.disconnect(); } catch(_) {}
    lowpassNode = null;

    try { await ctx?.close(); } catch(_) {}
    ctx = null;
    analyser = null;

    slowPower = null;
    lastT = null;
    audioPrimed = false;

    dbEl.textContent = '--';
    updateSummary();
    setState('safe', 'STANDBY', '待機中');

    btn.textContent = '開始';
    btn.dataset.state = 'off';
    btn.disabled = false;
  }

  settingsBtn.addEventListener('click', () => {
    const open = !settingsPanel.classList.contains('open');
    settingsPanel.classList.toggle('open', open);
    settingsBtn.setAttribute('aria-expanded', String(open));
    settingsBtn.textContent = open ? '閉じる' : '設定';
  });

  [
    cautionDbInput,
    warningDbInput,
    cautionSecInput,
    warningSecInput,
    clearMarginInput,
    clearSecInput,
    audioEnabledInput,
    voiceLangInput,
    voiceCooldownInput,
    audioVolumeInput,
    filterModeInput,
    highpassHzInput,
    lowpassHzInput
  ].forEach(el => {
    el.addEventListener('input', saveSettings);
    el.addEventListener('change', saveSettings);
  });

  window.addEventListener('storage', (event) => {
    if (Object.values(STORAGE_KEYS).includes(event.key)){
      applySettingsToInputs();
      updateSummary();
      if (btn.dataset.state !== 'on') setState('safe', 'STANDBY', '待機中');
    }
  });

  btn.addEventListener('click', async () => {
    if (btn.dataset.state === 'on') await stop();
    else await start();
  });

  testAudioBtn.addEventListener('click', () => {
    if (!ctx){
      alert('先に「開始」を押してください');
      return;
    }
    primeAudio();
    playAviationTone('out');
    speakAlert('out');
  });

  applySettingsToInputs();
  updateSummary();
  setState('safe', 'STANDBY', '待機中');
</script>
</body>
