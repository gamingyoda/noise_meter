name: Apply vivid traffic signal colors

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-traffic-colors.yml

permissions:
  contents: write

jobs:
  update-colors:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update only the state colors
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """    :root{
      --bg: #f6f7f9;
      --fg: #111;
      --muted: #666;
      --panel: rgba(255,255,255,0.86);
      --border: rgba(0,0,0,0.08);
      --button: #f1f3f5;
    }""",
                  """    :root{
      --bg: #0067c0;
      --fg: #fff;
      --muted: #eaf4ff;
      --panel: rgba(0,50,105,0.72);
      --border: rgba(255,255,255,0.42);
      --button: rgba(255,255,255,0.20);
    }""",
              ),
              (
                  """    body.state-quiet{
      --bg:#f6f7f9;
      --fg:#111;
      --muted:#666;
      --panel:rgba(255,255,255,0.88);
      --border:rgba(0,0,0,0.08);
      --button:#f1f3f5;
    }""",
                  """    body.state-quiet{
      --bg:#0067c0;
      --fg:#fff;
      --muted:#eaf4ff;
      --panel:rgba(0,50,105,0.72);
      --border:rgba(255,255,255,0.42);
      --button:rgba(255,255,255,0.20);
    }""",
              ),
              (
                  """    body.state-warning{
      --bg:#fff3cd;
      --fg:#5c4500;
      --muted:#856404;
      --panel:rgba(255,255,255,0.84);
      --border:rgba(133,100,4,0.18);
      --button:#fff8e1;
    }""",
                  """    body.state-warning{
      --bg:#ffd400;
      --fg:#111;
      --muted:#3b3100;
      --panel:rgba(255,255,255,0.38);
      --border:rgba(0,0,0,0.24);
      --button:rgba(255,255,255,0.48);
    }""",
              ),
              (
                  """    body.state-noisy{
      --bg:#f8d7da;
      --fg:#6a1118;
      --muted:#842029;
      --panel:rgba(255,255,255,0.84);
      --border:rgba(132,32,41,0.18);
      --button:#fcebec;
    }""",
                  """    body.state-noisy{
      --bg:#e60012;
      --fg:#fff;
      --muted:#ffe7ea;
      --panel:rgba(120,0,10,0.68);
      --border:rgba(255,255,255,0.42);
      --button:rgba(255,255,255,0.20);
    }""",
              ),
              (
                  '・色の意味：白＝静か、黄＝注意、赤＝うるさい。',
                  '・色の意味：青＝静か、黄＝注意、赤＝うるさい。',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected text was not found:\n{old}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit the color-only change
        run: |
          rm .github/workflows/apply-traffic-colors.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-traffic-colors.yml
          git commit -m "Use vivid red yellow and blue state colors"
          git push
